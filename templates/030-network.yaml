###############################
# Service
###############################
---
kind: Service
apiVersion: v1
metadata:
  name: gitea-service
spec:
  selector:
    app: gitea
  ports:
  - name: gitea-http
    port: 80
    targetPort: 3000
  - name: gitea-ssh
    port: 22
    targetPort: 22
---
###################################################
# Ingress
###################################################
apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: gitea
spec:
  virtualhost:
    fqdn: {{ .Values.ingress.host }}
    # Redirect plain HTTP -> HTTPS (equivalent of force-ssl-redirect)
    insecure:
      policy: Redirect
    {{- if .Values.ingress.tls.enabled }}
    tls:
      secretName: {{ .Values.ingress.tls.secretName }}
    {{- end }}
  routes:
    - conditions:
        - prefix: /
      # Per-route timeouts approximating your NGINX read/send/connect timeouts
      timeoutPolicy:
        # How long Envoy will wait for the upstream to respond
        response: 3600s
        # Idle timeout for the connection (no data in either direction)
        idle: 3600s
      services:
        - name: gitea-service
          port: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gitea
  annotations:
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}-rodzinka
  {{- end }}
  rules:
    - host: {{ .Values.ingress.hostRodzinka }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gitea-service
                port:
                  number: 80